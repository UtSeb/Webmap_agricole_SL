<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observatoire Agricole — Sud Lorraine</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d1117;
      --panel:     #161b22;
      --border:    #30363d;
      --accent:    #3fb950;
      --accent2:   #58a6ff;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --danger:    #f85149;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }
    .header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }
    header span.sub {
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
    }
    .header-spacer { flex: 1; }
    .header-tag {
      font-size: 10px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.1em;
    }

    /* ── LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      height: 100%;
    }

    /* ── PANEL ── */
    #panel {
      width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Légende couches */
    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .layer-toggle:hover { opacity: 0.8; }
    .layer-toggle input { display: none; }
    .toggle-box {
      width: 14px; height: 14px;
      border: 2px solid var(--accent);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .toggle-box.active { background: var(--accent); }
    .toggle-box.active::after {
      content: '✓';
      color: var(--bg);
      font-size: 9px;
      font-weight: bold;
    }
    .layer-toggle span { font-size: 12px; color: var(--text); }

    /* Fonds de carte */
    .basemap-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 2px;
    }
    .basemap-btn:hover { border-color: var(--accent2); color: var(--text); }
    .basemap-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(88,166,255,0.08); }

    /* ── ONGLETS MODE ── */
    .mode-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mode-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: 'DM Mono', monospace;
    }
    .mode-tab:hover { color: var(--text); }
    .mode-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── PANNEAU CULTURES ── */
    #cultures-panel {
      display: none;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }
    #cultures-panel.visible {
      display: flex;
    }

    /* Grand types */
    .grand-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .grand-type-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 7px 6px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .grand-type-btn:hover { border-color: var(--text); color: var(--text); }
    .grand-type-btn.active {
      border-color: var(--accent);
      color: var(--text);
    }
    .grand-type-btn .gt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Sous-filtres cultures */
    #sub-cultures-section {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #sub-cultures-section::-webkit-scrollbar { width: 3px; }
    #sub-cultures-section::-webkit-scrollbar-thumb { background: var(--border); }

    .culture-chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .culture-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 4px 8px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .culture-chip:hover { color: var(--text); border-color: var(--text); }
    .culture-chip.active {
      color: var(--bg);
      font-weight: bold;
    }

    /* Légende cultures */
    #culture-legend {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .legend-culture-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .legend-culture-swatch {
      width: 14px; height: 14px;
      border: 1px solid var(--border);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Info commune scrollable */
    #commune-info {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    #commune-info::-webkit-scrollbar { width: 4px; }
    #commune-info::-webkit-scrollbar-track { background: var(--bg); }
    #commune-info::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── SAU PANEL ── */
    #sau-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }

    /* Légende SAU */
    #sau-legend {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .info-placeholder {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      padding: 40px 0;
      line-height: 1.8;
    }
    .info-placeholder .icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

    .commune-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .commune-code {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-key { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
    .stat-val {
      font-size: 14px;
      font-weight: 400;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .stat-val.blue { color: var(--accent2); }

    .cultures-title {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 16px 0 8px;
    }

    .culture-bar-row {
      margin-bottom: 8px;
    }
    .culture-bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      margin-bottom: 3px;
    }
    .culture-bar-name { color: var(--text); }
    .culture-bar-val { color: var(--muted); }
    .culture-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .culture-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Leaflet overrides */
    .leaflet-control-zoom a {
      background: var(--panel) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--border) !important;
    }
    .leaflet-control-attribution {
      background: rgba(13,17,23,0.8) !important;
      color: var(--muted) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: var(--accent2) !important; }

    .ville-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      font-family: 'Syne', sans-serif !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      color: #111 !important;
      text-shadow:
        -1px -1px 0 #fff,  1px -1px 0 #fff,
        -1px  1px 0 #fff,  1px  1px 0 #fff !important;
      letter-spacing: 0.06em !important;
      white-space: nowrap !important;
    }
    .ville-label::before { display: none !important; }

    .commune-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      font-family: 'DM Mono', monospace !important;
      font-size: 9px !important;
      color: #111 !important;
      text-shadow:
        -1px -1px 0 #fff,  1px -1px 0 #fff,
        -1px  1px 0 #fff,  1px  1px 0 #fff !important;
      white-space: nowrap !important;
      pointer-events: none !important;
    }
    .commune-label::before { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="header-dot"></div>
  <h1>Observatoire Agricole <span class="sub">/ Sud Lorraine</span></h1>
  <div class="header-spacer"></div>
  <div class="header-tag">BD RPG</div>
</header>

<div class="main">
  <div id="map"></div>

  <div id="panel">

    <!-- Fonds de carte -->
    <div class="panel-section">
      <div class="panel-label">Fond de carte</div>
      <div id="basemap-btns">
        <button class="basemap-btn active" data-bm="osm">OSM</button>
        <button class="basemap-btn" data-bm="ignOrtho">IGN Ortho</button>
        <button class="basemap-btn" data-bm="ignPlan">IGN Plan</button>
        <button class="basemap-btn" data-bm="satellite">Satellite</button>
        <button class="basemap-btn" data-bm="topo">Topo</button>
      </div>
    </div>

    <!-- Couches -->
    <div class="panel-section">
      <div class="panel-label">Couches</div>
      <label class="layer-toggle" id="toggle-rpg">
        <div class="toggle-box active" id="toggle-rpg-box"></div>
        <span>Communes BD RPG</span>
      </label>
      <label class="layer-toggle" id="toggle-labels">
        <div class="toggle-box active" id="toggle-labels-box"></div>
        <span>Villes principales</span>
      </label>
    </div>

    <!-- Onglets de mode -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-sau">% SAU</button>
      <button class="mode-tab" id="tab-cultures">Cultures</button>
    </div>

    <!-- ══ PANNEAU SAU ══ -->
    <div id="sau-panel">
      <div id="sau-legend">
        <div class="panel-label">% SAU / surface commune</div>
        <div style="display:flex; flex-direction:column; gap:4px;">
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:14px;height:14px;background:#1a5c28;border:1px solid #30363d;border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:var(--text)">≥ 80%</span></div>
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:14px;height:14px;background:#2d7a3a;border:1px solid #30363d;border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:var(--text)">60 – 80%</span></div>
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:14px;height:14px;background:#4d9b5e;border:1px solid #30363d;border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:var(--text)">40 – 60%</span></div>
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:14px;height:14px;background:#90c49a;border:1px solid #30363d;border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:var(--text)">20 – 40%</span></div>
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:14px;height:14px;background:#d4edda;border:1px solid #30363d;border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:var(--text)">0 – 20%</span></div>
          <div style="display:flex;align-items:center;gap:8px;"><div style="width:14px;height:14px;background:#f5f5f5;border:1px solid #30363d;border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:var(--muted)">Aucune donnée</span></div>
        </div>
      </div>
      <div id="commune-info">
        <div class="info-placeholder">
          <div class="icon">⬡</div>
          Cliquez sur une commune<br>pour afficher ses données agricoles
        </div>
      </div>
    </div>

    <!-- ══ PANNEAU CULTURES ══ -->
    <div id="cultures-panel">

      <!-- Grand types -->
      <div class="panel-section">
        <div class="panel-label">Grand type de culture</div>
        <div class="grand-type-grid" id="grand-type-grid">
          <!-- généré en JS -->
        </div>
      </div>

      <!-- Cultures détaillées -->
      <div id="sub-cultures-section" style="display:none;">
        <div class="panel-label" id="sub-cultures-label">Cultures</div>
        <div class="culture-chip-grid" id="culture-chip-grid">
          <!-- généré en JS -->
        </div>
      </div>

      <!-- Légende dynamique -->
      <div id="culture-legend" style="display:none;">
        <div class="panel-label">Légende</div>
        <div id="culture-legend-content"></div>
      </div>

    </div>

  </div><!-- /panel -->
</div><!-- /main -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

// ═══════════════════════════════════════════
// CODES CULTURES BD RPG
// ═══════════════════════════════════════════
const CULTURES = {
  "1":  "Céréales (autres)",
  "11": "Blé tendre",
  "15": "Maïs grain/ensilage",
  "16": "Orge",
  "17": "Autres céréales",
  "18": "Colza",
  "19": "Tournesol",
  "2":  "Protéagineux",
  "20": "Autres oléagineux",
  "21": "Légumineuses fourragères",
  "22": "Fourrage",
  "24": "Prairie permanente",
  "25": "Prairie temporaire",
  "28": "Légumes / fleurs",
  "3":  "Vigne",
  "4":  "Verger",
  "5":  "Estive / lande",
  "6":  "Canne à sucre",
  "7":  "Divers",
  "8":  "Gel",
  "9":  "Autre"
};

// ═══════════════════════════════════════════
// CLASSIFICATION PAR GRAND TYPE
// couleur = palette distincte par type
// ═══════════════════════════════════════════
const GRAND_TYPES = [
  {
    id: "cereales",
    label: "Grandes cultures céréalières",
    color: "#d4a843",        // ocre/blé
    colorMuted: "rgba(212,168,67,0.18)",
    codes: ["11","15","16","17","1"]
  },
  {
    id: "oleagineux",
    label: "Oléoprotéagineux",
    color: "#c7d43b",        // jaune-vert colza
    colorMuted: "rgba(199,212,59,0.18)",
    codes: ["18","19","20","2"]
  },
  {
    id: "herbages",
    label: "Herbages & élevage",
    color: "#3fb950",        // vert prairie
    colorMuted: "rgba(63,185,80,0.18)",
    codes: ["24","25","22","21","5"]
  },
  {
    id: "fruits",
    label: "Fruits & arboriculture",
    color: "#e07b39",        // orange
    colorMuted: "rgba(224,123,57,0.18)",
    codes: ["4","3"]
  },
  {
    id: "maraichage",
    label: "Maraîchage & horticulture",
    color: "#58a6ff",        // bleu
    colorMuted: "rgba(88,166,255,0.18)",
    codes: ["28","9"]
  },
  {
    id: "autres",
    label: "Autres / Divers",
    color: "#8b949e",        // gris
    colorMuted: "rgba(139,148,158,0.18)",
    codes: ["6","7","8"]
  }
];

// Lookup rapide : code → grand type
const CODE_TO_GT = {};
GRAND_TYPES.forEach(gt => gt.codes.forEach(c => CODE_TO_GT[c] = gt));

// ═══════════════════════════════════════════
// ÉTAT FILTRES
// ═══════════════════════════════════════════
let currentMode = 'sau';          // 'sau' | 'grandtype' | 'culture'
let activeGrandType = null;       // objet GRAND_TYPES
let activeCulture   = null;       // code culture string

// ═══════════════════════════════════════════
// CARTE
// ═══════════════════════════════════════════
const map = L.map('map', { zoomControl: true }).setView([48.4, 6.2], 9);

const baseMaps = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri', maxZoom: 19
  }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap', maxZoom: 17
  }),
  ignPlan: L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2&STYLE=normal&FORMAT=image/png&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', {
    attribution: '© IGN-Géoplateforme', maxZoom: 18
  }),
  ignOrtho: L.tileLayer('https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&STYLE=normal&FORMAT=image/jpeg&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}', {
    attribution: '© IGN-Géoplateforme', maxZoom: 19
  })
};
baseMaps.osm.addTo(map);

document.querySelectorAll('.basemap-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.bm;
    Object.values(baseMaps).forEach(l => map.removeLayer(l));
    baseMaps[key].addTo(map);
    document.querySelectorAll('.basemap-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ═══════════════════════════════════════════
// SURFACE GÉODÉSIQUE
// ═══════════════════════════════════════════
function geojsonAreaHa(geometry) {
  const R = 6371000;
  function ringArea(coords) {
    let area = 0;
    const n = coords.length;
    for (let i = 0; i < n - 1; i++) {
      const [lng1, lat1] = coords[i];
      const [lng2, lat2] = coords[i + 1];
      area += (lng2 - lng1) * Math.PI / 180
            * (2 + Math.sin(lat1 * Math.PI / 180) + Math.sin(lat2 * Math.PI / 180));
    }
    return Math.abs(area * R * R / 2);
  }
  let total = 0;
  if (geometry.type === 'Polygon') {
    total = ringArea(geometry.coordinates[0]);
  } else if (geometry.type === 'MultiPolygon') {
    for (const poly of geometry.coordinates) total += ringArea(poly[0]);
  }
  return total / 10000;
}

// ═══════════════════════════════════════════
// HELPERS CULTURES
// ═══════════════════════════════════════════

// Retourne la culture majoritaire d'une commune {code, label, val}
function getCultureMajoritaire(p) {
  let best = null, bestVal = 0;
  for (const code of Object.keys(CULTURES)) {
    const v = Number(p['rpg_' + code] || 0);
    if (v > bestVal) { bestVal = v; best = code; }
  }
  return best ? { code: best, label: CULTURES[best], val: bestVal } : null;
}

// Surface totale d'un grand type pour une commune
function getSurfGrandType(p, gt) {
  return gt.codes.reduce((sum, c) => sum + Number(p['rpg_' + c] || 0), 0);
}

// ═══════════════════════════════════════════
// STYLE SAU (mode % SAU)
// ═══════════════════════════════════════════
function getPctSAU(feature) {
  const p = feature.properties;
  const surf = Number(p.rpg_surf_ha || 0);
  if (surf <= 0) return 0;
  const communeHa = geojsonAreaHa(feature.geometry);
  if (communeHa <= 0) return 0;
  return Math.min((surf / communeHa) * 100, 100);
}

function sauColor(pct) {
  if (pct <= 0)  return { fill: '#f5f5f5', opacity: 0.7 };
  if (pct < 20)  return { fill: '#d4edda', opacity: 0.75 };
  if (pct < 40)  return { fill: '#90c49a', opacity: 0.80 };
  if (pct < 60)  return { fill: '#4d9b5e', opacity: 0.85 };
  if (pct < 80)  return { fill: '#2d7a3a', opacity: 0.88 };
  return               { fill: '#1a5c28', opacity: 0.90 };
}

// ═══════════════════════════════════════════
// STYLE DYNAMIQUE selon le mode actif
// ═══════════════════════════════════════════
function styleCommune(feature) {
  const p = feature.properties;

  // ── Mode : culture précise ──
  if (currentMode === 'culture' && activeCulture) {
    const cult = getCultureMajoritaire(p);
    const isMatch = cult && cult.code === activeCulture;
    const gt = CODE_TO_GT[activeCulture] || { color: '#8b949e' };
    return {
      color: '#000',
      weight: isMatch ? 2 : 0.8,
      opacity: isMatch ? 0.9 : 0.4,
      fillColor: isMatch ? gt.color : '#1a1f26',
      fillOpacity: isMatch ? 0.85 : 0.25
    };
  }

  // ── Mode : grand type ──
  if (currentMode === 'grandtype' && activeGrandType) {
    const cult = getCultureMajoritaire(p);
    const isMatch = cult && CODE_TO_GT[cult.code] && CODE_TO_GT[cult.code].id === activeGrandType.id;
    return {
      color: '#000',
      weight: isMatch ? 2 : 0.8,
      opacity: isMatch ? 0.9 : 0.4,
      fillColor: isMatch ? activeGrandType.color : '#1a1f26',
      fillOpacity: isMatch ? 0.85 : 0.25
    };
  }

  // ── Mode SAU (défaut) ──
  const pct = getPctSAU(feature);
  const { fill, opacity } = sauColor(pct);
  return { color: '#000000', weight: 1.2, opacity: 0.6, fillColor: fill, fillOpacity: opacity };
}

// ═══════════════════════════════════════════
// POPUP COMMUNE
// ═══════════════════════════════════════════
let rpgLayer = null;

function highlightCommune(e) {
  e.target.setStyle({ weight: 2.5, color: '#58a6ff', fillOpacity: 0.95 });
}
function resetHighlight(e) {
  rpgLayer.resetStyle(e.target);
}

function showCommuneInfo(feature) {
  const p = feature.properties;
  const nom  = p.nom  || p.NOM_COM || p.name || '—';
  const code = p.code || p.INSEE_COM || p.CODE_INSEE || '—';
  const surf = p.rpg_surf_ha != null ? Number(p.rpg_surf_ha).toLocaleString('fr-FR', {maximumFractionDigits:1}) : '—';
  const nb   = p.rpg_nb_parc != null ? Number(p.rpg_nb_parc).toLocaleString('fr-FR') : '—';

  const communeHa = geojsonAreaHa(feature.geometry);
  const surfNum   = Number(p.rpg_surf_ha || 0);
  const pctSAU    = communeHa > 0 ? Math.min((surfNum / communeHa) * 100, 100).toFixed(1) : '—';
  const communeHaStr = communeHa > 0 ? communeHa.toLocaleString('fr-FR', {maximumFractionDigits:0}) : '—';

  const cultureData = [];
  let maxSurf = 0;
  for (const [code_c, label] of Object.entries(CULTURES)) {
    const val = Number(p['rpg_' + code_c] || 0);
    if (val > 0) {
      cultureData.push({ code: code_c, label, val });
      if (val > maxSurf) maxSurf = val;
    }
  }
  cultureData.sort((a, b) => b.val - a.val);

  let culturesHTML = '';
  if (cultureData.length > 0) {
    culturesHTML = `<div class="cultures-title">Détail par culture (ha)</div>`;
    for (const c of cultureData) {
      const pctBar = maxSurf > 0 ? (c.val / maxSurf * 100).toFixed(1) : 0;
      const gt = CODE_TO_GT[c.code];
      const barColor = gt ? gt.color : 'var(--accent)';
      culturesHTML += `
        <div class="culture-bar-row">
          <div class="culture-bar-header">
            <span class="culture-bar-name">${c.label}</span>
            <span class="culture-bar-val">${c.val.toLocaleString('fr-FR', {maximumFractionDigits:1})} ha</span>
          </div>
          <div class="culture-bar-bg">
            <div class="culture-bar-fill" style="width:${pctBar}%;background:${barColor}"></div>
          </div>
        </div>`;
    }
  } else {
    culturesHTML = `<div class="info-placeholder" style="padding:16px 0"><span style="color:var(--muted);font-size:11px">Aucune donnée agricole</span></div>`;
  }

  const sauC = sauColor(parseFloat(pctSAU));
  document.getElementById('commune-info').innerHTML = `
    <div class="commune-name">${nom}</div>
    <div class="commune-code">INSEE ${code}</div>
    <div class="stat-row">
      <span class="stat-key">SURFACE COMMUNE</span>
      <span class="stat-val blue">${communeHaStr} ha</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">SURFACE AGRICOLE</span>
      <span class="stat-val">${surf} ha</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">% SAU</span>
      <span class="stat-val" style="color:${sauC.fill === '#f5f5f5' ? 'var(--muted)' : sauC.fill}">${pctSAU}%</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">NB PARCELLES</span>
      <span class="stat-val blue">${nb}</span>
    </div>
    ${culturesHTML}
  `;
}

function onEachCommune(feature, layer) {
  layer.on({
    mouseover: highlightCommune,
    mouseout: resetHighlight,
    click: () => {
      showCommuneInfo(feature);
      // Si on est sur l'onglet cultures, basculer sur SAU pour afficher l'info
      if (currentMode !== 'sau') {
        activateTab('sau');
      }
    }
  });
}

// Chargement GeoJSON
fetch('data/communes_rpg.geojson')
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    rpgLayer = L.geoJSON(data, {
      style: styleCommune,
      onEachFeature: onEachCommune
    }).addTo(map);
    map.fitBounds(rpgLayer.getBounds());
    buildUI(); // construction des boutons après chargement
  })
  .catch(() => {
    document.getElementById('commune-info').innerHTML = `
      <div class="info-placeholder">
        <div class="icon" style="color:var(--danger)">⚠</div>
        Fichier data/communes_rpg.geojson<br>introuvable
      </div>`;
  });

// ═══════════════════════════════════════════
// CONSTRUCTION UI CULTURES
// ═══════════════════════════════════════════
function buildUI() {
  const grid = document.getElementById('grand-type-grid');
  grid.innerHTML = '';

  GRAND_TYPES.forEach(gt => {
    const btn = document.createElement('button');
    btn.className = 'grand-type-btn';
    btn.dataset.id = gt.id;
    btn.innerHTML = `
      <div class="gt-dot" style="background:${gt.color};box-shadow:0 0 5px ${gt.color}"></div>
      ${gt.label}`;
    btn.addEventListener('click', () => selectGrandType(gt));
    grid.appendChild(btn);
  });
}

function selectGrandType(gt) {
  // Désélectionner si déjà actif → retour au mode grand type "tous"
  if (activeGrandType && activeGrandType.id === gt.id) {
    activeGrandType = null;
    activeCulture   = null;
    currentMode     = 'sau';
    document.querySelectorAll('.grand-type-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.culture-chip').forEach(b => b.classList.remove('active'));
    document.getElementById('sub-cultures-section').style.display = 'none';
    document.getElementById('culture-legend').style.display = 'none';
    refreshLayer();
    return;
  }

  activeGrandType = gt;
  activeCulture   = null;
  currentMode     = 'grandtype';

  // Boutons grand type
  document.querySelectorAll('.grand-type-btn').forEach(b => {
    const isActive = b.dataset.id === gt.id;
    b.classList.toggle('active', isActive);
    b.style.borderColor   = isActive ? gt.color : '';
    b.style.background    = isActive ? gt.colorMuted : '';
    b.style.color         = isActive ? gt.color : '';
  });

  // Chips cultures détaillées
  const chipGrid  = document.getElementById('culture-chip-grid');
  const subSection = document.getElementById('sub-cultures-section');
  const subLabel  = document.getElementById('sub-cultures-label');
  chipGrid.innerHTML = '';
  subLabel.textContent = gt.label + ' — détail';

  gt.codes.forEach(code => {
    const chip = document.createElement('button');
    chip.className = 'culture-chip';
    chip.dataset.code = code;
    chip.textContent = CULTURES[code] || code;
    chip.style.setProperty('--chip-color', gt.color);
    chip.addEventListener('click', () => selectCulture(code, gt));
    chipGrid.appendChild(chip);
  });
  subSection.style.display = 'block';

  // Légende grand type
  showLegendGrandType(gt);
  refreshLayer();
}

function selectCulture(code, gt) {
  // Toggle
  if (activeCulture === code) {
    activeCulture = null;
    currentMode   = 'grandtype';
    document.querySelectorAll('.culture-chip').forEach(b => b.classList.remove('active'));
    showLegendGrandType(gt);
    refreshLayer();
    return;
  }

  activeCulture = code;
  currentMode   = 'culture';

  document.querySelectorAll('.culture-chip').forEach(b => {
    const isActive = b.dataset.code === code;
    b.classList.toggle('active', isActive);
    if (isActive) {
      b.style.background  = gt.color;
      b.style.borderColor = gt.color;
      b.style.color       = '#0d1117';
    } else {
      b.style.background  = '';
      b.style.borderColor = '';
      b.style.color       = '';
    }
  });

  showLegendCulture(code, gt);
  refreshLayer();
}

// ── Légende grand type ──
function showLegendGrandType(gt) {
  const legend = document.getElementById('culture-legend');
  const content = document.getElementById('culture-legend-content');
  legend.style.display = 'block';
  content.innerHTML = `
    <div class="legend-culture-row">
      <div class="legend-culture-swatch" style="background:${gt.color}"></div>
      <span style="font-size:10px;color:var(--text)">Communes dont la culture<br>majoritaire appartient à<br><strong style="color:${gt.color}">${gt.label}</strong></span>
    </div>
    <div class="legend-culture-row" style="margin-top:8px">
      <div class="legend-culture-swatch" style="background:#1a1f26"></div>
      <span style="font-size:10px;color:var(--muted)">Autre type majoritaire</span>
    </div>
  `;
}

// ── Légende culture précise ──
function showLegendCulture(code, gt) {
  const legend  = document.getElementById('culture-legend');
  const content = document.getElementById('culture-legend-content');
  legend.style.display = 'block';
  content.innerHTML = `
    <div class="legend-culture-row">
      <div class="legend-culture-swatch" style="background:${gt.color}"></div>
      <span style="font-size:10px;color:var(--text)">Communes dont la culture<br>majoritaire est<br><strong style="color:${gt.color}">${CULTURES[code]}</strong></span>
    </div>
    <div class="legend-culture-row" style="margin-top:8px">
      <div class="legend-culture-swatch" style="background:#1a1f26"></div>
      <span style="font-size:10px;color:var(--muted)">Autre culture majoritaire</span>
    </div>
  `;
}

// ── Re-style du layer ──
function refreshLayer() {
  if (!rpgLayer) return;
  rpgLayer.setStyle(styleCommune);
}

// ═══════════════════════════════════════════
// ONGLETS SAU / CULTURES
// ═══════════════════════════════════════════
function activateTab(tab) {
  const sauPanel      = document.getElementById('sau-panel');
  const culturesPanel = document.getElementById('cultures-panel');
  const tabSau        = document.getElementById('tab-sau');
  const tabCultures   = document.getElementById('tab-cultures');

  if (tab === 'sau') {
    sauPanel.style.display      = 'flex';
    culturesPanel.style.display = 'none';
    tabSau.classList.add('active');
    tabCultures.classList.remove('active');
    // Retour au style SAU si on revient sur cet onglet
    if (currentMode !== 'sau') {
      currentMode = 'sau';
      refreshLayer();
    }
  } else {
    sauPanel.style.display      = 'none';
    culturesPanel.style.display = 'flex';
    tabCultures.classList.add('active');
    tabSau.classList.remove('active');
    // Rétablit le mode culture si un filtre était actif
    if (activeCulture) currentMode = 'culture';
    else if (activeGrandType) currentMode = 'grandtype';
    // sinon on laisse sau mais sans re-style (la carte reste en SAU jusqu'à un clic)
    if (activeGrandType) refreshLayer();
  }
}

document.getElementById('tab-sau').addEventListener('click', () => activateTab('sau'));
document.getElementById('tab-cultures').addEventListener('click', () => {
  activateTab('cultures');
  if (!activeGrandType) {
    // Premier accès : style SAU conservé, invite à choisir
    currentMode = 'sau';
    refreshLayer();
  }
});

// ═══════════════════════════════════════════
// VILLES PRINCIPALES
// ═══════════════════════════════════════════
const VILLES = [
  { nom: "Nancy",      lat: 48.6921, lng: 6.1844 },
  { nom: "Épinal",     lat: 48.1741, lng: 6.4508 },
  { nom: "Saint-Dié",  lat: 48.2842, lng: 6.9508 },
  { nom: "Bar-le-Duc", lat: 48.7731, lng: 5.1608 }
];

const villeIcon = L.divIcon({
  className: '',
  html: `<div style="width:10px;height:10px;background:#fff;border:2px solid #000;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,0.4);"></div>`,
  iconSize: [10, 10], iconAnchor: [5, 5]
});

const villesMarkers = VILLES.map(v =>
  L.marker([v.lat, v.lng], { icon: villeIcon })
    .bindTooltip(v.nom, { permanent: true, direction: 'top', offset: [0, -8], className: 'ville-label' })
);
const villesLayer = L.layerGroup(villesMarkers).addTo(map);

let villesVisible = true;
document.getElementById('toggle-labels').addEventListener('click', () => {
  if (villesVisible) {
    map.removeLayer(villesLayer);
    document.getElementById('toggle-labels-box').classList.remove('active');
  } else {
    villesLayer.addTo(map);
    document.getElementById('toggle-labels-box').classList.add('active');
  }
  villesVisible = !villesVisible;
});

// ═══════════════════════════════════════════
// TOGGLE COUCHE BD RPG
// ═══════════════════════════════════════════
let rpgVisible = true;
document.getElementById('toggle-rpg').addEventListener('click', () => {
  if (!rpgLayer) return;
  if (rpgVisible) {
    map.removeLayer(rpgLayer);
    document.getElementById('toggle-rpg-box').classList.remove('active');
  } else {
    rpgLayer.addTo(map);
    document.getElementById('toggle-rpg-box').classList.add('active');
  }
  rpgVisible = !rpgVisible;
});

</script>
